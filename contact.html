<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg"></div>
  <div class="cursor-glow"></div>
  <nav class="navbar">
    <div class="container">
      <h1 class="nav-title">無定型 FARMLESS</h1>
      <ul class="nav-links">
        <li><a href="index.html">首頁</a></li>
        <li><a href="about.html">關於我們</a></li>
        <li><a href="works.html">作品展示</a></li>
        <li><a href="team.html">團隊介紹</a></li>
        <li><a href="venue.html">展場資訊</a></li>
        <li><a href="sponsors.html">贊助廠商</a></li>
        <li><a href="filmfestival.html">線上影展</a></li>
        <li><a href="contact.html">聯絡我們</a></li>
      </ul>
    </div>
  </nav>
  <main class="container">
    <section class="hero-section">
      <h1 class="page-title">聯絡我們</h1>
      <p class="page-subtitle">有任何問題或建議嗎？歡迎聯絡我們</p>
    </section>

    <!-- 聯絡資訊 -->
    <section id="contact-info" class="panel">
      <h2>聯絡資訊</h2>
      <div class="contact-details">
        <div class="contact-item">
          <h3>地址</h3>
          <p>國立臺北大學 三峽校區</p>
          <p>新北市三峽區大學路 151 號</p>
        </div>
        <div class="contact-item">
          <h3>電話</h3>
          <p>敬請期待</p>
        </div>
        <div class="contact-item">
          <h3>電子郵件</h3>
          <p>敬請期待</p>
        </div>
        <div class="contact-item">
          <h3>社群媒體</h3>
          <div class="social-links">
            <a href="#" class="social-icon" title="Facebook">f</a>
            <a href="#" class="social-icon" title="Instagram">✌</a>
            <a href="#" class="social-icon" title="YouTube">▶</a>
          </div>
        </div>
      </div>
    </section>

    <!-- 聯絡表單 -->
    <section id="contact-form" class="panel">
      <h2>聯絡表單</h2>
      <form class="form-container">
        <div class="form-group">
          <label for="name">姓名</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="form-group">
          <label for="email">電子郵件</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label for="subject">主旨</label>
          <input type="text" id="subject" name="subject" required />
        </div>
        <div class="form-group">
          <label for="message">訊息</label>
          <textarea id="message" name="message" rows="8" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">送出</button>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
